# Конфигурация базы данных
spring.datasource.url=jdbc:sqlite:fivednevnik.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Конфигурация JPA/Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Конфигурация Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.database-change-log-table=DATABASECHANGELOG
spring.liquibase.database-change-log-lock-table=DATABASECHANGELOGLOCK

# Конфигурация JWT
jwt.secret=fivednevniksecretkey12345678901234567890
jwt.expiration=86400000

# Настройки сервера
server.port=8080
server.servlet.context-path=/api

# Логирование
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.com.fivednevnik=DEBUG

# Настройки CORS
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600 